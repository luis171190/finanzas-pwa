<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f13" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanzas" />
  <title>Finanzas — Luis Molina</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset & Base ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a22;
      --surface2:  #22222e;
      --border:    #2e2e3e;
      --text:      #e8e8f0;
      --muted:     #7070a0;
      --accent:    #6c63ff;
      --green:     #22c55e;
      --yellow:    #eab308;
      --red:       #ef4444;
      --orange:    #f97316;
      --blue:      #3b82f6;
      --radius:    12px;
      --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Layout ──────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header span.mes-badge {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    #btn-refresh {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      transition: color 0.2s;
      padding: 4px;
    }
    #btn-refresh:hover { color: var(--accent); }
    #btn-refresh.spinning { animation: spin 1s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tabs ────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: color 0.2s;
      position: relative;
    }

    .tab-btn.active {
      color: var(--text);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      right: 20%;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── Scrollable content ──────────────────────────── */
    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 32px;
      gap: 12px;
      flex-direction: column;
    }

    .tab-content.active {
      display: flex;
    }

    /* ── Cards ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── TC Strip ────────────────────────────────────── */
    .tc-strip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .tc-strip .tc-val {
      font-weight: 700;
      font-size: 15px;
      color: var(--green);
    }

    .tc-strip .tc-fecha {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Ingreso row ─────────────────────────────────── */
    .ingreso-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 4px 0 12px;
    }

    .ingreso-usd {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
    }

    .ingreso-sep { color: var(--muted); font-size: 16px; }

    .ingreso-ars {
      font-size: 18px;
      font-weight: 600;
      color: var(--muted);
    }

    /* ── Budget bars ─────────────────────────────────── */
    .budget-item {
      margin-bottom: 14px;
    }

    .budget-item:last-child { margin-bottom: 0; }

    .budget-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .budget-label {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .budget-pct-badge {
      font-size: 10px;
      color: var(--muted);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 10px;
    }

    .budget-amounts {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .budget-amounts strong {
      color: var(--text);
      font-weight: 600;
    }

    .bar-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    /* ── Billeteras grid ─────────────────────────────── */
    .billeteras-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .billetera-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .billetera-nombre {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .billetera-saldo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* ── Tarjetas list ───────────────────────────────── */
    .tarjeta-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .tarjeta-item:last-child { border-bottom: none; padding-bottom: 0; }

    .tarjeta-left { flex: 1; min-width: 0; }

    .tarjeta-desc {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tarjeta-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .tarjeta-right { text-align: right; flex-shrink: 0; margin-left: 12px; }

    .tarjeta-monto {
      font-size: 14px;
      font-weight: 700;
    }

    .tarjeta-cuotas {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }

    .tag-galicia  { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .tag-naranja  { background: rgba(249,115,22,0.15);  color: #fb923c; }
    .tag-black    { background: rgba(168,85,247,0.15);  color: #c084fc; }

    /* ── Gastos list ─────────────────────────────────── */
    .gasto-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .gasto-item:last-child { border-bottom: none; padding-bottom: 0; }

    .gasto-desc {
      font-size: 13px;
      font-weight: 500;
    }

    .gasto-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .gasto-monto {
      font-size: 14px;
      font-weight: 700;
      color: var(--red);
      flex-shrink: 0;
      margin-left: 12px;
    }

    /* ── KPI grid ────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .kpi-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 12px;
    }

    .kpi-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Chart container ─────────────────────────────── */
    .chart-wrap {
      position: relative;
      height: 200px;
    }

    /* ── Loading / error ─────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 0;
      gap: 12px;
      color: var(--muted);
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
    }

    /* ── Disponible highlight ────────────────────────── */
    .disponible-box {
      background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(108,99,255,0.04));
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .disponible-label { font-size: 13px; color: var(--muted); }
    .disponible-val {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    /* ── Scrollbar styling ───────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <h1>💰 Finanzas</h1>
    <span class="mes-badge" id="mes-badge">—</span>
    <button id="btn-refresh" title="Actualizar">↻</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="panorama">Panorama</button>
    <button class="tab-btn" data-tab="analytics">Analytics</button>
  </nav>

  <!-- ══ TAB PANORAMA ══════════════════════════════════ -->
  <div class="tab-content active" id="tab-panorama">
    <div id="panorama-loading" class="loading-state">
      <div class="spinner"></div>
      <span>Cargando datos…</span>
    </div>
    <div id="panorama-content" style="display:none; flex-direction:column; gap:12px;">

      <!-- TC -->
      <div class="tc-strip">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:2px;">DÓLAR BLUE</div>
          <span class="tc-val" id="tc-valor">—</span>
        </div>
        <span class="tc-fecha" id="tc-fecha">—</span>
      </div>

      <!-- Ingreso -->
      <div class="card">
        <div class="card-title">Ingreso del mes</div>
        <div class="ingreso-row">
          <span class="ingreso-usd" id="ing-usd">—</span>
          <span class="ingreso-sep">→</span>
          <span class="ingreso-ars" id="ing-ars">—</span>
        </div>
      </div>

      <!-- Presupuesto -->
      <div class="card">
        <div class="card-title">Presupuesto</div>
        <div id="budget-list"></div>
      </div>

      <!-- Disponible -->
      <div class="disponible-box">
        <span class="disponible-label">Disponible hoy</span>
        <span class="disponible-val" id="disponible">—</span>
      </div>

      <!-- Billeteras -->
      <div class="card">
        <div class="card-title">Billeteras</div>
        <div class="billeteras-grid" id="billeteras-grid"></div>
      </div>

      <!-- Tarjetas activas -->
      <div class="card">
        <div class="card-title">Cuotas activas</div>
        <div id="tarjetas-list"></div>
      </div>

      <!-- Últimos gastos -->
      <div class="card">
        <div class="card-title">Últimos gastos</div>
        <div id="gastos-list"></div>
      </div>

    </div>
  </div>

  <!-- ══ TAB ANALYTICS ═════════════════════════════════ -->
  <div class="tab-content" id="tab-analytics">
    <div id="analytics-loading" class="loading-state" style="display:none">
      <div class="spinner"></div>
      <span>Cargando…</span>
    </div>
    <div id="analytics-content" style="flex-direction:column; gap:12px;">

      <!-- KPIs -->
      <div class="card">
        <div class="card-title">KPIs del mes</div>
        <div class="kpi-grid" id="kpi-grid"></div>
      </div>

      <!-- Evolución gastos -->
      <div class="card">
        <div class="card-title">Evolución mensual</div>
        <div class="chart-wrap">
          <canvas id="chart-evolucion"></canvas>
        </div>
        <div id="no-historial" class="empty-msg" style="display:none">Sin historial de meses cerrados aún</div>
      </div>

      <!-- Compromisos total -->
      <div class="card">
        <div class="card-title">Compromisos tarjeta</div>
        <div id="compromisos-resumen"></div>
      </div>

    </div>
  </div>

</div>

<script>
const API_URL = 'https://sswebhook.myaivaro.com/webhook/dash-data';
let DATA = null;
let chartEvol = null;

// ── Utils ────────────────────────────────────────────
const fmt = (n) => Math.round(Number(n) || 0).toLocaleString('es-AR');
const fmtPct = (n) => (Number(n) || 0).toFixed(1) + '%';
const pct = (a, b) => b > 0 ? Math.min(100, Math.round(Number(a) / Number(b) * 100)) : 0;

function barColor(pct) {
  if (pct >= 90) return 'var(--red)';
  if (pct >= 70) return 'var(--yellow)';
  return 'var(--green)';
}

function tagClass(tarjeta) {
  if (!tarjeta) return '';
  const t = tarjeta.toLowerCase();
  if (t.includes('black')) return 'tag-black';
  if (t.includes('galicia') || t.includes('mastercard')) return 'tag-galicia';
  if (t.includes('naranja')) return 'tag-naranja';
  return '';
}

function tagName(tarjeta) {
  if (!tarjeta) return '';
  const t = tarjeta.toLowerCase();
  if (t.includes('black')) return 'Black';
  if (t.includes('galicia') || t.includes('mastercard')) return 'Galicia';
  if (t.includes('naranja')) return 'Naranja X';
  return tarjeta;
}

function mesNombre(yyyymm) {
  const meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const [y, m] = yyyymm.split('-');
  return `${meses[parseInt(m)]} ${y}`;
}

function mesFull(yyyymm) {
  const meses = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const [y, m] = yyyymm.split('-');
  return `${meses[parseInt(m)]} ${y}`;
}

// ── Fetch ────────────────────────────────────────────
async function fetchData() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  try {
    const res = await fetch(API_URL, { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    renderAll();
  } catch(e) {
    console.error(e);
    document.getElementById('panorama-loading').innerHTML =
      `<span style="color:var(--red)">Error al cargar datos</span><button onclick="fetchData()" style="color:var(--accent);background:none;border:none;cursor:pointer;font-size:14px;">Reintentar</button>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── Render all ───────────────────────────────────────
function renderAll() {
  if (!DATA) return;
  renderPanorama();
  renderAnalytics();
}

// ── Panorama ─────────────────────────────────────────
function renderPanorama() {
  const d = DATA;
  document.getElementById('panorama-loading').style.display = 'none';
  const content = document.getElementById('panorama-content');
  content.style.display = 'flex';

  // Mes badge
  document.getElementById('mes-badge').textContent = mesFull(d.anio_mes);

  // TC
  document.getElementById('tc-valor').textContent = '$' + fmt(d.tc_blue);
  const tcDate = d.tc_fecha ? new Date(d.tc_fecha).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit'}) : '—';
  document.getElementById('tc-fecha').textContent = 'Actualizado ' + tcDate;

  // Ingreso
  document.getElementById('ing-usd').textContent = 'U$D ' + fmt(d.ingreso_total_usd);
  document.getElementById('ing-ars').textContent = '$' + fmt(d.ingreso_total_ars);

  // Budget
  const budgetItems = [
    { emoji: '🏠', label: 'Necesidades', pctLabel: '40%', gastado: d.gastado_necesidades, total: d.presupuesto_necesidades },
    { emoji: '🎯', label: 'Deseos',       pctLabel: '25%', gastado: d.gastado_deseos,     total: d.presupuesto_deseos },
    { emoji: '💚', label: 'Ahorro',       pctLabel: '20%', gastado: d.ahorro_real,         total: d.presupuesto_ahorro },
    { emoji: '💳', label: 'Reserva TC',   pctLabel: '10%', gastado: d.compromisos_tc,      total: Math.round(d.ingreso_total_ars * 0.10) },
    { emoji: '🛡️', label: 'Imprevistos', pctLabel: '5%',  gastado: 0,                     total: Math.round(d.ingreso_total_ars * 0.05) },
  ];

  const budgetEl = document.getElementById('budget-list');
  budgetEl.innerHTML = budgetItems.map(item => {
    const p = pct(item.gastado, item.total);
    const color = barColor(p);
    return `
      <div class="budget-item">
        <div class="budget-row">
          <span class="budget-label">
            ${item.emoji} ${item.label}
            <span class="budget-pct-badge">${item.pctLabel}</span>
          </span>
          <span class="budget-amounts">
            <strong>$${fmt(item.gastado)}</strong> / $${fmt(item.total)}
          </span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${p}%;background:${color}"></div>
        </div>
      </div>`;
  }).join('');

  // Disponible
  document.getElementById('disponible').textContent = '$' + fmt(d.disponible_para_gastar);

  // Billeteras
  const billeterasEl = document.getElementById('billeteras-grid');
  if (d.billeteras && d.billeteras.length) {
    billeterasEl.innerHTML = d.billeteras.map(b => {
      const saldo = b.saldo || 0;
      const color = saldo > 0 ? 'var(--text)' : 'var(--muted)';
      return `
        <div class="billetera-item">
          <div class="billetera-nombre">${b.nombre}</div>
          <div class="billetera-saldo" style="color:${color}">$${fmt(saldo)}</div>
        </div>`;
    }).join('');
  }

  // Tarjetas activas (cuotas)
  const tarjetasEl = document.getElementById('tarjetas-list');
  if (d.compromisos && d.compromisos.length) {
    // Filtrar hermanos
    const propias = d.compromisos.filter(c => !c.desc.includes('HERMANO'));
    tarjetasEl.innerHTML = propias.map(c => {
      const restantes = c.total - c.cuota_actual;
      const isUltima = restantes <= 1;
      return `
        <div class="tarjeta-item">
          <div class="tarjeta-left">
            <div class="tarjeta-desc">${c.desc}</div>
            <div class="tarjeta-meta">
              <span class="tag ${tagClass(c.tarjeta)}">${tagName(c.tarjeta)}</span>
              ${isUltima ? ' <span style="color:var(--yellow);font-size:11px;">⚠️ última cuota</span>' : ''}
            </div>
          </div>
          <div class="tarjeta-right">
            <div class="tarjeta-monto">$${fmt(c.cuota)}</div>
            <div class="tarjeta-cuotas">${c.cuota_actual}/${c.total} cuotas</div>
          </div>
        </div>`;
    }).join('');
  } else {
    tarjetasEl.innerHTML = '<p class="empty-msg">Sin cuotas activas</p>';
  }

  // Últimos gastos
  const gastosEl = document.getElementById('gastos-list');
  if (d.ultimos_gastos && d.ultimos_gastos.length) {
    gastosEl.innerHTML = d.ultimos_gastos.map(g => {
      const fecha = new Date(g.fecha + 'T12:00:00').toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit'});
      return `
        <div class="gasto-item">
          <div>
            <div class="gasto-desc">${g.desc}</div>
            <div class="gasto-meta">${g.categoria} · ${fecha} · ${g.metodo.replace(/_/g,' ')}</div>
          </div>
          <div class="gasto-monto">−$${fmt(g.monto)}</div>
        </div>`;
    }).join('');
  } else {
    gastosEl.innerHTML = '<p class="empty-msg">Sin gastos registrados</p>';
  }
}

// ── Analytics ─────────────────────────────────────────
function renderAnalytics() {
  const d = DATA;

  // KPIs
  const ingARS = Number(d.ingreso_total_ars) || 1;
  const gastNec = Number(d.gastado_necesidades) || 0;
  const gastDes = Number(d.gastado_deseos) || 0;
  const totalGastado = gastNec + gastDes;
  const tasaAhorro = Math.max(0, Math.round((1 - totalGastado / ingARS) * 100));
  const comprTC = Number(d.compromisos_tc) || 0;
  const pctTC = Math.round(comprTC / ingARS * 100);

  const totalPendiente = (d.compromisos || [])
    .filter(c => !c.desc.includes('HERMANO'))
    .reduce((s, c) => s + (Number(c.cuota) * (Number(c.total) - Number(c.cuota_actual))), 0);

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-item">
      <div class="kpi-label">Gastado este mes</div>
      <div class="kpi-value" style="color:var(--red)">$${fmt(totalGastado)}</div>
      <div class="kpi-sub">${fmtPct(totalGastado / ingARS * 100)} del ingreso</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-label">Tasa de ahorro</div>
      <div class="kpi-value" style="color:${tasaAhorro >= 20 ? 'var(--green)' : 'var(--yellow)'}">${tasaAhorro}%</div>
      <div class="kpi-sub">${tasaAhorro >= 20 ? 'Por encima meta' : 'Por debajo de 20%'}</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-label">Compromisos TC</div>
      <div class="kpi-value" style="color:${pctTC > 30 ? 'var(--red)' : 'var(--text)'}">$${fmt(comprTC)}</div>
      <div class="kpi-sub">${pctTC}% del ingreso</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-label">Deuda total TC</div>
      <div class="kpi-value" style="font-size:16px">$${fmt(totalPendiente)}</div>
      <div class="kpi-sub">cuotas pendientes</div>
    </div>
  `;

  // Chart evolución
  const historial = d.historial_meses;
  if (!historial || historial.length === 0) {
    document.getElementById('no-historial').style.display = 'block';
    document.getElementById('chart-evolucion').style.display = 'none';
  } else {
    document.getElementById('no-historial').style.display = 'none';
    const sorted = [...historial].sort((a,b) => a.mes.localeCompare(b.mes));
    const labels = sorted.map(h => mesNombre(h.mes));
    const nec = sorted.map(h => Math.round(Number(h.necesidades) || 0));
    const des = sorted.map(h => Math.round(Number(h.deseos) || 0));
    const aho = sorted.map(h => Math.round(Number(h.ahorro) || 0));

    if (chartEvol) chartEvol.destroy();
    const ctx = document.getElementById('chart-evolucion').getContext('2d');
    chartEvol = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Necesidades', data: nec, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 4 },
          { label: 'Deseos',      data: des, backgroundColor: 'rgba(249,115,22,0.7)',  borderRadius: 4 },
          { label: 'Ahorro',      data: aho, backgroundColor: 'rgba(34,197,94,0.7)',   borderRadius: 4 },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#7070a0', font: { size: 11 }, boxWidth: 12 } },
          tooltip: {
            callbacks: {
              label: ctx => ` $${ctx.raw.toLocaleString('es-AR')}`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#7070a0', font: { size: 11 } }, grid: { color: '#2e2e3e' } },
          y: {
            ticks: {
              color: '#7070a0', font: { size: 10 },
              callback: v => '$' + (v/1000).toFixed(0) + 'k'
            },
            grid: { color: '#2e2e3e' }
          }
        }
      }
    });
  }

  // Compromisos resumen agrupado por tarjeta
  const compromisos = (d.compromisos || []).filter(c => !c.desc.includes('HERMANO'));
  const porTarjeta = {};
  compromisos.forEach(c => {
    const t = tagName(c.tarjeta);
    if (!porTarjeta[t]) porTarjeta[t] = { total: 0, items: [] };
    porTarjeta[t].total += Number(c.cuota);
    porTarjeta[t].items.push(c);
  });

  document.getElementById('compromisos-resumen').innerHTML = Object.entries(porTarjeta).map(([tarjeta, data]) => `
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span class="tag ${tagClass(data.items[0].tarjeta)}">${tarjeta}</span>
        <span style="font-size:14px;font-weight:700;">$${fmt(data.total)}<span style="font-size:11px;color:var(--muted);font-weight:400;">/mes</span></span>
      </div>
      ${data.items.map(c => `
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:3px 0;">
          <span>${c.desc}</span>
          <span>${c.cuota_actual}/${c.total}</span>
        </div>`).join('')}
    </div>`).join('<hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">');
}

// ── Tabs ─────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

document.getElementById('btn-refresh').addEventListener('click', fetchData);

// ── Service Worker ───────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── Init ─────────────────────────────────────────────
fetchData();
</script>
</body>
</html>
